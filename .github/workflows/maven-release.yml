name: Maven Release

on:
  workflow_dispatch:
    inputs:
      release_kind:
        description: "How to compute the release version"
        required: false
        default: current
        type: choice
        options:
          - current
          - patch
          - minor
          - major
          - custom
      release_version:
        description: "Required when release_kind=custom"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: maven-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  manual_release_guard:
    name: Manual release guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow sources
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}

      - name: Validate release inputs
        shell: bash
        env:
          RELEASE_KIND: ${{ inputs.release_kind }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          TRIMMED_RELEASE_VERSION="$(printf '%s' "$RELEASE_VERSION" | xargs)"

          if [ "$RELEASE_KIND" = "custom" ] && [ -z "$TRIMMED_RELEASE_VERSION" ]; then
            {
              echo "## Release input error"
              echo
              echo "- release_kind: \`$RELEASE_KIND\`"
              echo "- release_version: empty"
              echo
              echo "When \`release_kind=custom\`, you must provide an explicit semantic version such as \`1.2.0\`."
            } >> "$GITHUB_STEP_SUMMARY"

            echo "::error::release_version is mandatory when release_kind=custom."
            exit 1
          fi

      - name: Ensure workflow runs on the default branch
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "${{ github.event.repository.default_branch }}" ]; then
            echo "Release workflow must run on the default branch: ${{ github.event.repository.default_branch }}"
            exit 1
          fi

      - name: Ensure the default branch is protected
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.payload.repository.default_branch;
            const { data } = await github.rest.repos.getBranch({ owner, repo, branch });

            core.info(`Default branch ${branch} protected=${data.protected}`);

            if (!data.protected) {
              core.setFailed(`Release workflow requires the default branch ${branch} to be protected.`);
            }

      - name: Ensure validation workflow is green on this commit
        uses: ./.github/actions/require-workflow-success
        with:
          workflow_path: .github/workflows/maven-ci.yml
          workflow_label: Maven Build, Test, Quality and Security
          branch: ${{ github.ref_name }}
          sha: ${{ github.sha }}
          event: push

  manual_release:
    name: Manual Spring Boot release
    needs: manual_release_guard
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/reusable-maven-release.yml
    with:
      project_dir: ${{ vars.CI_PROJECT_DIR || 'examples/spring-boot-actuator' }}
      maven_repository_owner: ${{ vars.MAVEN_REPOSITORY_OWNER || '' }}
      release_java_version: ${{ vars.CI_RELEASE_JAVA_VERSION || vars.CI_BUILD_JAVA_VERSION || '25' }}
      release_signing_enabled: ${{ vars.CI_ENABLE_GPG_SIGNING == 'true' }}
      release_kind: ${{ inputs.release_kind }}
      release_version: ${{ inputs.release_version }}
      release_profile: ${{ vars.CI_RELEASE_PROFILE || 'release' }}
      release_args: ${{ vars.CI_RELEASE_ARGS || '-DskipTests -Dquality.owasp.skip=true -Dsonar.skip=true' }}
      next_snapshot_strategy: ${{ vars.CI_NEXT_SNAPSHOT_STRATEGY || 'patch' }}
    secrets:
      maven_settings_xml: ${{ secrets.MAVEN_SETTINGS_XML }}
      release_pat: ${{ secrets.RELEASE_PAT }}
      gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
      gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}
